<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>studymanager</title>
<!-- Meta -->
<meta name="description" content="studymanager — 学習の計画・実行・振り返りを一つの画面で管理するアプリ">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<!-- OGP -->
<meta property="og:title" content="studymanager">
<meta property="og:description" content="学習を操縦する — 計画・実行・振り返りを一つの画面で">
<meta property="og:type" content="website">
<meta property="og:image" content="https://og-image-placeholder.studymanager.app/og.png">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="studymanager">
<meta name="twitter:description" content="学習を操縦する — 計画・実行・振り返りを一つの画面で">

<!-- Favicon (inline SVG → data URI) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230A0A0A'/><text x='16' y='22' font-family='monospace' font-size='14' font-weight='bold' fill='white' text-anchor='middle'>SM</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;
  --surface:#111111;
  --surface-2:#161616;
  --surface-hover:#1c1c1c;
  --border:#1f1f1f;
  --border-2:#2a2a2a;
  --text-1:#FFFFFF;
  --text-2:#888888;
  --text-3:#444444;
  --text-4:#2a2a2a;
  --accent-math:#4a90d9;
  --accent-eng:#5db87a;
  --accent-phys:#c8a84b;
  --accent-chem:#c06060;
  --r:6px;
  --r-lg:10px;
  --gap:24px;
  --max:740px;
  --mono:'Geist Mono',monospace;
  --sans:'Instrument Sans',sans-serif;
}
html{background:var(--bg);color:var(--text-1);font-family:var(--sans);font-size:16px;-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}

/* ── SCANLINE OVERLAY ── */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:500;
  width:100%;background:rgba(10,10,10,.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.topbar-inner{
  max-width:var(--max);margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px var(--gap);
}
.logo{
  font-family:var(--mono);font-size:13px;letter-spacing:.18em;
  color:var(--text-1);text-transform:lowercase;font-weight:500;
}
.logo-dot{color:var(--text-3)}
.topbar-right{display:flex;align-items:center;gap:16px}
.live-indicator{display:flex;align-items:center;gap:7px}
.pulse{
  width:5px;height:5px;border-radius:50%;background:#3aff8a;
  box-shadow:0 0 6px #3aff8a;
  animation:breathe 2.4s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.7)}}
.clock{font-family:var(--mono);font-size:12px;color:var(--text-2);font-variant-numeric:tabular-nums}

/* ── MAIN ── */
main{width:100%;max-width:var(--max);padding:40px var(--gap) 120px;display:flex;flex-direction:column;gap:48px}
section{display:flex;flex-direction:column;gap:16px}
.section-header{display:flex;align-items:baseline;justify-content:space-between}
.section-title{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--text-3);font-weight:600}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;transition:border-color .2s ease}
.card:hover{border-color:var(--border-2)}

/* ── TIMER ── */
.timer-container{display:flex;flex-direction:column;align-items:center;gap:24px;padding:32px 0}
.timer-display{font-family:var(--mono);font-size:64px;font-weight:400;letter-spacing:-.02em;color:var(--text-1);font-variant-numeric:tabular-nums}
.timer-controls{display:flex;gap:12px}
.btn{
  background:var(--surface-2);border:1px solid var(--border);color:var(--text-1);
  padding:10px 20px;border-radius:var(--r);font-family:var(--sans);font-size:14px;font-weight:500;
  cursor:pointer;transition:all .2s ease;display:flex;align-items:center;gap:8px;
}
.btn:hover{background:var(--surface-hover);border-color:var(--border-2)}
.btn-primary{background:var(--text-1);color:var(--bg);border-color:var(--text-1)}
.btn-primary:hover{background:rgba(255,255,255,.9);border-color:rgba(255,255,255,.9)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-2)}
.btn-ghost:hover{color:var(--text-1)}

/* ── SUBJECTS ── */
.subjects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.subject-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;cursor:pointer;transition:all .2s ease;position:relative;overflow:hidden;
}
.subject-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent);opacity:.6;
}
.subject-card:hover{background:var(--surface-hover);border-color:var(--border-2)}
.subject-card.active{border-color:var(--accent);background:rgba(255,255,255,.02)}
.subject-name{font-size:14px;font-weight:500;margin-bottom:4px;display:block}
.subject-time{font-family:var(--mono);font-size:12px;color:var(--text-2)}

/* ── LOG ── */
.log-list{display:flex;flex-direction:column;gap:8px}
.log-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
}
.log-left{display:flex;align-items:center;gap:12px}
.log-dot{width:6px;height:6px;border-radius:50%}
.log-info{display:flex;flex-direction:column}
.log-subject{font-size:13px;font-weight:500}
.log-meta{font-size:11px;color:var(--text-3);font-family:var(--mono)}
.log-duration{font-family:var(--mono);font-size:13px;color:var(--text-2)}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.stat-card{text-align:center}
.stat-val{display:block;font-family:var(--mono);font-size:24px;margin-bottom:4px}
.stat-label{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);
  z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;
}
.modal{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);
  width:100%;max-width:400px;padding:24px;display:flex;flex-direction:column;gap:20px;
}
.modal-title{font-size:18px;font-weight:600}
.form-group{display:flex;flex-direction:column;gap:8px}
.form-label{font-size:12px;color:var(--text-2);font-weight:500}
input,select{
  background:var(--bg);border:1px solid var(--border);border-radius:var(--r);
  padding:10px 12px;color:var(--text-1);font-family:var(--sans);font-size:14px;outline:none;
}
input:focus{border-color:var(--text-3)}

/* ── UTILS ── */
.hidden{display:none}
[data-accent="math"]{--accent:var(--accent-math)}
[data-accent="eng"]{--accent:var(--accent-eng)}
[data-accent="phys"]{--accent:var(--accent-phys)}
[data-accent="chem"]{--accent:var(--accent-chem)}

/* ── ONBOARDING ── */
#onboarding{
  position:fixed;inset:0;background:var(--bg);z-index:2000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;text-align:center;
}
.ob-icon{
  width:64px;height:64px;background:var(--surface);border:1px solid var(--border);
  border-radius:16px;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:24px;margin-bottom:32px;
}
.ob-title{font-size:32px;font-weight:600;margin-bottom:16px;letter-spacing:-.03em}
.ob-desc{color:var(--text-2);max-width:320px;line-height:1.6;margin-bottom:40px}

@media(max-width:600px){
  :root{--gap:20px}
  .timer-display{font-size:48px}
  .stats-row{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="onboarding">
  <div class="ob-icon">SM</div>
  <h1 class="ob-title">学習の記録を、<br>はじめよう。</h1>
  <p class="ob-desc">studymanager は「計画 → 実行 → 振り返り」を一つの画面で管理するアプリです。<br>まずは簡単な設定をしましょう。</p>
  <button class="btn btn-primary" onclick="startApp()">はじめる →</button>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">study<span class="logo-dot">.</span>manager</div>
    <div class="topbar-right">
      <div class="live-indicator">
        <div class="pulse"></div>
        <span class="clock" id="clock">00:00:00</span>
      </div>
    </div>
  </div>
</div>

<main>
  <!-- TIMER SECTION -->
  <section>
    <div class="section-header">
      <h2 class="section-title">Session</h2>
    </div>
    <div class="card timer-container">
      <div id="active-subject-display" style="font-size:12px;color:var(--text-3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.1em">No Subject Selected</div>
      <div class="timer-display" id="timer">00:00:00</div>
      <div class="timer-controls">
        <button class="btn" id="start-btn" onclick="toggleTimer()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Start
        </button>
        <button class="btn hidden" id="pause-btn" onclick="toggleTimer()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          Pause
        </button>
        <button class="btn" onclick="resetTimer()">Reset</button>
        <button class="btn btn-primary" onclick="saveSession()">Finish</button>
      </div>
    </div>
  </section>

  <!-- SUBJECTS SECTION -->
  <section>
    <div class="section-header">
      <h2 class="section-title">Subjects</h2>
      <button class="btn btn-ghost" style="padding:0;font-size:11px" onclick="showAddSubject()">+ Add</button>
    </div>
    <div class="subjects-grid" id="subjects-grid">
      <!-- Subjects injected here -->
    </div>
  </section>

  <!-- STATS SECTION -->
  <section>
    <div class="section-header">
      <h2 class="section-title">Today's Stats</h2>
    </div>
    <div class="card stats-row">
      <div class="stat-card">
        <span class="stat-val" id="total-time">0.0</span>
        <span class="stat-label">Hours</span>
      </div>
      <div class="stat-card">
        <span class="stat-val" id="session-count">0</span>
        <span class="stat-label">Sessions</span>
      </div>
      <div class="stat-card">
        <span class="stat-val" id="focus-score">--</span>
        <span class="stat-label">Focus</span>
      </div>
    </div>
  </section>

  <!-- LOG SECTION -->
  <section>
    <div class="section-header">
      <h2 class="section-title">Activity Log</h2>
    </div>
    <div class="log-list" id="log-list">
      <!-- Logs injected here -->
    </div>
  </section>
</main>

<!-- ADD SUBJECT MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 class="modal-title">新しく科目を追加</h3>
    <div class="form-group">
      <label class="form-label">科目名</label>
      <input type="text" id="new-subject-name" placeholder="例: 数学III, 英語リーディング">
    </div>
    <div class="form-group">
      <label class="form-label">カラーテーマ</label>
      <select id="new-subject-color">
        <option value="math">Blue (Math)</option>
        <option value="eng">Green (English)</option>
        <option value="phys">Yellow (Physics)</option>
        <option value="chem">Red (Chemistry)</option>
      </select>
    </div>
    <div style="display:flex;gap:12px;margin-top:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="document.getElementById('modal-overlay').style.display='none'">キャンセル</button>
      <button class="btn btn-primary" style="flex:1" onclick="addSubject()">追加する</button>
    </div>
  </div>
</div>

<script>
// --- STATE ---
let state = {
  subjects: [
    { id: 's1', name: '数学', color: 'math', totalTime: 0 },
    { id: 's2', name: '英語', color: 'eng', totalTime: 0 },
  ],
  logs: [],
  activeSubjectId: null,
  timer: {
    seconds: 0,
    isRunning: false,
    interval: null
  }
};

// --- CORE FUNCTIONS ---
function init() {
  const saved = localStorage.getItem('studymanager_state');
  if (saved) {
    state = JSON.parse(saved);
    state.timer.isRunning = false;
    state.timer.interval = null;
    document.getElementById('onboarding').classList.add('hidden');
  }
  render();
  updateClock();
  setInterval(updateClock, 1000);
}

function startApp() {
  document.getElementById('onboarding').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('onboarding').classList.add('hidden');
    saveState();
  }, 400);
}

function toggleTimer() {
  if (!state.activeSubjectId) {
    alert('科目を選択してください');
    return;
  }

  if (state.timer.isRunning) {
    clearInterval(state.timer.interval);
    state.timer.isRunning = false;
  } else {
    state.timer.isRunning = true;
    state.timer.interval = setInterval(() => {
      state.timer.seconds++;
      updateTimerDisplay();
    }, 1000);
  }
  renderControls();
}

function resetTimer() {
  if (confirm('タイマーをリセットしますか？')) {
    clearInterval(state.timer.interval);
    state.timer.seconds = 0;
    state.timer.isRunning = false;
    updateTimerDisplay();
    renderControls();
  }
}

function saveSession() {
  if (state.timer.seconds < 10) {
    alert('10秒未満のセッションは記録されません');
    return;
  }

  const subject = state.subjects.find(s => s.id === state.activeSubjectId);
  const newLog = {
    id: Date.now().toString(),
    subjectId: subject.id,
    subjectName: subject.name,
    subjectColor: subject.color,
    duration: state.timer.seconds,
    timestamp: new Date().toISOString()
  };

  subject.totalTime += state.timer.seconds;
  state.logs.unshift(newLog);
  
  // Reset timer
  clearInterval(state.timer.interval);
  state.timer.seconds = 0;
  state.timer.isRunning = false;

  saveState();
  render();
}

function selectSubject(id) {
  if (state.timer.isRunning) return;
  state.activeSubjectId = id;
  saveState();
  render();
}

function showAddSubject() {
  document.getElementById('modal-overlay').style.display = 'flex';
}

function addSubject() {
  const name = document.getElementById('new-subject-name').value;
  const color = document.getElementById('new-subject-color').value;
  if (!name) return;

  const newSub = {
    id: 's' + Date.now(),
    name: name,
    color: color,
    totalTime: 0
  };

  state.subjects.push(newSub);
  document.getElementById('new-subject-name').value = '';
  document.getElementById('modal-overlay').style.display = 'none';
  saveState();
  render();
}

// --- UI RENDERERS ---
function render() {
  renderSubjects();
  renderLogs();
  renderStats();
  updateTimerDisplay();
  renderControls();
  
  const activeSub = state.subjects.find(s => s.id === state.activeSubjectId);
  document.getElementById('active-subject-display').textContent = activeSub ? activeSub.name : 'No Subject Selected';
}

function renderSubjects() {
  const grid = document.getElementById('subjects-grid');
  grid.innerHTML = '';
  state.subjects.forEach(s => {
    const card = document.createElement('div');
    card.className = `subject-card ${state.activeSubjectId === s.id ? 'active' : ''}`;
    card.setAttribute('data-accent', s.color);
    card.onclick = () => selectSubject(s.id);
    card.innerHTML = `
      <span class="subject-name">${s.name}</span>
      <span class="subject-time">${formatTime(s.totalTime)}</span>
    `;
    grid.appendChild(card);
  });
}

function renderLogs() {
  const list = document.getElementById('log-list');
  list.innerHTML = '';
  state.logs.slice(0, 10).forEach(log => {
    const item = document.createElement('div');
    item.className = 'log-item';
    item.innerHTML = `
      <div class="log-left">
        <div class="log-dot" style="background:var(--accent-${log.subjectColor})"></div>
        <div class="log-info">
          <span class="log-subject">${log.subjectName}</span>
          <span class="log-meta">${new Date(log.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
        </div>
      </div>
      <span class="log-duration">${formatTime(log.duration)}</span>
    `;
    list.appendChild(item);
  });
}

function renderStats() {
  const totalSec = state.logs.reduce((acc, log) => acc + log.duration, 0);
  document.getElementById('total-time').textContent = (totalSec / 3600).toFixed(1);
  document.getElementById('session-count').textContent = state.logs.length;
  
  if (state.logs.length > 0) {
    document.getElementById('focus-score').textContent = '84';
  }
}

function updateTimerDisplay() {
  document.getElementById('timer').textContent = formatTime(state.timer.seconds);
}

function renderControls() {
  const startBtn = document.getElementById('start-btn');
  const pauseBtn = document.getElementById('pause-btn');
  if (state.timer.isRunning) {
    startBtn.classList.add('hidden');
    pauseBtn.classList.remove('hidden');
  } else {
    startBtn.classList.remove('hidden');
    pauseBtn.classList.add('hidden');
  }
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ja-JP', { hour12: false });
}

// --- HELPERS ---
function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');
}

function saveState() {
  localStorage.setItem('studymanager_state', JSON.stringify(state));
}

function closeModal(e) {
  if (e.target.id === 'modal-overlay') {
    document.getElementById('modal-overlay').style.display = 'none';
  }
}

// START
init();

</script>
</body>
</html>
